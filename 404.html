<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vingly</title>
<script>
  // /j/slug 경로 처리
  const path = window.location.pathname;
  if (path.startsWith('/j/')) {
    // j.html로 slug 전달
    const slug = path.replace('/j/', '');
    window.location.replace('/j.html?slug=' + encodeURIComponent(slug));
  } else {
    // 그 외 404는 메인으로
    window.location.replace('/');
  }
</script>
</head>
<body></body>
</html>
