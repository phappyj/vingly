<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vingly — 페이지를 찾을 수 없습니다</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Pretendard:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--b:#0B4F7A;--g:#085C3A;--bg:#F8F7F3;--sf:#fff;--t:#0D0D0D;--ts:#4A4A4A;--br:#E2E0DA}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.logo{display:flex;align-items:center;gap:8px;margin-bottom:48px}
.lm{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--b),#063550);display:flex;align-items:center;justify-content:center}
.lm svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round}
.ln{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--b)}
.num{font-family:'Syne',sans-serif;font-size:clamp(80px,18vw,160px);font-weight:800;line-height:1;background:linear-gradient(135deg,var(--b),var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.title{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,32px);font-weight:800;margin-bottom:12px}
.desc{font-size:16px;color:var(--ts);line-height:1.7;max-width:400px;margin-bottom:36px}
.btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{padding:13px 24px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;transition:all .2s;min-height:50px;display:inline-flex;align-items:center}
.btn-p{background:var(--b);color:#fff;border:none}
.btn-p:hover{background:#1472B0;transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--t);border:1.5px solid var(--br)}
.btn-o:hover{border-color:var(--b);color:var(--b)}
.deco{position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 60% 50% at 20% 40%,rgba(11,79,122,.06) 0%,transparent 70%),radial-gradient(ellipse 50% 60% at 80% 60%,rgba(8,92,58,.04) 0%,transparent 70%)}
</style>
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TH29BK606P"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TH29BK606P');
  </script>
</head>
<body>
<div class="deco"></div>
<div class="logo">
  <div class="lm"><svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
  <span class="ln">Vingly</span>
</div>
<div class="num">404</div>
<div class="title">페이지를 찾을 수 없습니다</div>
<div class="desc">요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>아래 버튼으로 돌아가세요.</div>
<div class="btns">
  <a class="btn btn-p" href="index.html">🏠 메인으로 돌아가기</a>
  <a class="btn btn-o" href="index.html#faq">도움말 보기</a>
</div>
</body>
</html>
