<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TH29BK606P"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-TH29BK606P');
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vingly — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C0E12; --ink-60:rgba(12,14,18,.6); --ink-35:rgba(12,14,18,.35);
  --ink-14:rgba(12,14,18,.14); --ink-06:rgba(12,14,18,.06);
  --canvas:#F5F4F0; --white:#fff;
  --blue:#1D4ED8; --blue-bg:#EFF6FF;
  --green:#00B37E; --green-bg:#E6FBF4;
  --red:#DC2626; --red-bg:#FEF2F2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh;display:grid;grid-template-columns:1fr 1fr;-webkit-font-smoothing:antialiased}

/* LEFT PANEL */
.left{background:var(--ink);display:flex;flex-direction:column;justify-content:space-between;padding:48px;position:relative;overflow:hidden}
.left-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:400px;height:400px;top:-120px;left:-80px;background:radial-gradient(circle,rgba(29,78,216,.3) 0%,transparent 65%)}
.orb2{width:300px;height:300px;bottom:-80px;right:-60px;background:radial-gradient(circle,rgba(4,120,87,.2) 0%,transparent 65%)}
.left-logo{display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.logo-gem{width:34px;height:34px;border-radius:9px;background:#00B37E;display:flex;align-items:center;justify-content:center}
.logo-gem svg{width:34px;height:34px;}
.logo-name{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.4px}
.left-main{position:relative;z-index:1}
.left-title{font-size:clamp(28px,3.5vw,44px);font-weight:800;color:#fff;line-height:1.1;letter-spacing:-1.5px;margin-bottom:14px}
.left-title em{font-style:normal;color:#7CB9FF}
.left-desc{font-size:15px;color:rgba(255,255,255,.5);line-height:1.75;max-width:360px;font-weight:400}
.left-stats{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.sc-ico{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sc-val{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sc-lbl{font-size:12px;color:rgba(255,255,255,.4);margin-top:1px;font-weight:500}
.sc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-top:4px;display:inline-block}
.badge-green{background:rgba(5,150,105,.2);color:#00E5A0}
.badge-blue{background:rgba(29,78,216,.2);color:#7CB9FF}

/* RIGHT PANEL */
.right{display:flex;align-items:center;justify-content:center;padding:48px 40px}
.form-box{width:100%;max-width:420px}
.form-header{margin-bottom:32px}
.form-eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-35);margin-bottom:8px}
.form-title{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--ink);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--ink-60);font-weight:400}
.form-sub a{color:var(--blue);text-decoration:none;font-weight:600}

/* SOCIAL BTNS */
.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.social-btn{padding:12px 16px;border-radius:10px;border:1.5px solid var(--ink-14);background:var(--white);display:flex;align-items:center;justify-content:center;gap:9px;font:600 14px/1 'Pretendard',sans-serif;color:var(--ink);cursor:pointer;transition:all .18s;min-height:46px}
.social-btn:hover{border-color:var(--ink-35);background:var(--ink-06)}
.social-btn:active{transform:scale(.97)}
.social-ico{width:20px;height:20px;object-fit:contain}
.kakao-btn{background:#FEE500;border-color:#FEE500;color:#000}
.kakao-btn:hover{background:#F5DC00;border-color:#F5DC00}

/* DIVIDER */
.or-divider{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.or-line{flex:1;height:1px;background:var(--ink-14)}
.or-text{font-size:12px;font-weight:600;color:var(--ink-35)}

/* FORM */
.fg{margin-bottom:14px}
.fl{font:700 13px/1 'Pretendard',sans-serif;color:var(--ink);display:block;margin-bottom:6px}
.fi{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--ink-14);background:var(--ink-06);font:400 14px/1 'Pretendard',sans-serif;outline:none;transition:all .18s;min-height:46px;color:var(--ink)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1);background:var(--white)}
.fi.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.08)}
.ferr{font-size:12px;color:var(--red);margin-top:4px;display:none}
.ferr.on{display:block}
.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:46px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-35);font-size:14px;padding:4px}
.pw-toggle:hover{color:var(--ink)}

/* OPTIONS */
.form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.remember{display:flex;align-items:center;gap:7px;cursor:pointer}
.remember input{width:15px;height:15px;border-radius:4px;accent-color:var(--blue)}
.remember span{font-size:13px;font-weight:500;color:var(--ink-60)}
.forgot-link{font-size:13px;font-weight:600;color:var(--blue);text-decoration:none}

/* SUBMIT */
.submit-btn{width:100%;padding:14px;border-radius:11px;background:var(--ink);color:#fff;border:none;font:800 15px/1 'Pretendard',sans-serif;cursor:pointer;min-height:50px;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{background:#1a1d24;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.submit-btn:active{transform:scale(.97)}
.submit-btn.loading{opacity:.7;pointer-events:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
.submit-btn.loading .spinner{display:block}
.submit-btn.loading .btn-text{display:none}

/* ERROR ALERT */
.alert{padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;align-items:center;gap:8px}
.alert.on{display:flex}
.alert-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.alert-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(4,120,87,.2)}

/* FOOTER */
.form-footer{text-align:center;margin-top:20px}
.form-footer p{font-size:13px;color:var(--ink-60)}
.form-footer a{color:var(--blue);text-decoration:none;font-weight:600}

/* DEMO HINT */
.demo-hint{margin-top:16px;padding:10px 14px;background:var(--blue-bg);border-radius:9px;border:1px solid rgba(29,78,216,.15)}
.demo-hint p{font-size:12px;color:var(--blue);font-weight:500;line-height:1.6}
.demo-hint strong{font-weight:700}

@keyframes spin{to{transform:rotate(360deg)}}

/* MOBILE */
@media(max-width:768px){
  body{grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .left{padding:24px;min-height:auto}
  .left-main,.left-stats{display:none}
  .right{padding:32px 20px;align-items:flex-start}
  .social-btns{grid-template-columns:1fr}
}
</style>

</head>
<body>

<!-- LEFT -->
<div class="left">
  <div class="orb1 left-orb"></div>
  <div class="orb2 left-orb"></div>
  <div class="left-logo">
    <div class="logo-gem"><svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="28" height="28" rx="7" fill="#00B37E"/>
  <path d="M7 14 L12 19 L21 10" stroke="#0A0C10" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M14 17.5 L19.5 23" stroke="#0A0C10" stroke-width="2.8" stroke-linecap="round" opacity="0.4"/>
</svg></div>
    <span class="logo-name">Vingly</span>
  </div>
  <div class="left-main">
    <h1 class="left-title">
      브랜드와 크리에이터를<br>
      <em>연결하는</em> 커머스<br>
      플랫폼
    </h1>
    <p class="left-desc">계약서, 미팅 없이 브랜드는 제품을 올리고, 크리에이터는 링크를 공유합니다. 수익 정산은 자동으로.</p>
  </div>
  <div class="left-stats">
    <div class="stat-card">
      <div class="sc-ico">🚀</div>
      <div>
        <div class="sc-val">파일럿 오픈</div>
        <div class="sc-lbl">지금 얼리버드 모집 중</div>
        <div class="sc-badge badge-green">수수료 0% 영구 혜택</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="sc-ico">🎁</div>
      <div>
        <div class="sc-val">크리에이터 무료</div>
        <div class="sc-lbl">플랫폼 수수료 없음</div>
        <div class="sc-badge badge-blue">브랜드 1.5% 얼리버드</div>
      </div>
    </div>
  </div>
</div>

<!-- RIGHT -->
<div class="right">
  <div class="form-box">
    <div class="form-header">
      <div class="form-eyebrow">Welcome back</div>
      <h2 class="form-title">로그인</h2>
      <p class="form-sub">처음이신가요? <a href="signup.html">무료로 시작하기 →</a></p>
    </div>

    <!-- SOCIAL -->
    <div class="social-btns">
      <button class="social-btn kakao-btn" onclick="socialLogin('kakao')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#000"><path d="M12 3C6.48 3 2 6.48 2 10.8c0 2.76 1.74 5.19 4.36 6.57l-1.1 4.08 4.76-3.14C10.64 18.44 11.31 18.5 12 18.5c5.52 0 10-3.48 10-7.7S17.52 3 12 3z"/></svg>
        카카오 로그인
      </button>
      <button class="social-btn" onclick="socialLogin('google')">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        구글 로그인
      </button>
    </div>

    <div class="or-divider">
      <div class="or-line"></div>
      <span class="or-text">또는 이메일로 로그인</span>
      <div class="or-line"></div>
    </div>

    <!-- ALERT -->
    <div class="alert alert-err" id="alertErr">
      <span>⚠️</span><span id="alertErrMsg">이메일 또는 비밀번호가 올바르지 않습니다.</span>
    </div>

    <!-- FORM -->
    <div class="fg">
      <label class="fl">이메일</label>
      <input class="fi" id="email" type="email" placeholder="vingly.official@gmail.com" oninput="clearErr(this)">
      <div class="ferr" id="email_err">이메일을 입력해주세요</div>
    </div>
    <div class="fg">
      <label class="fl">비밀번호</label>
      <div class="pw-wrap">
        <input class="fi" id="pw" type="password" placeholder="비밀번호 입력" oninput="clearErr(this)" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pw-toggle" onclick="togglePw()" title="비밀번호 보기">👁</button>
      </div>
      <div class="ferr" id="pw_err">비밀번호를 입력해주세요</div>
    </div>

    <div class="form-options">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>로그인 상태 유지</span>
      </label>
      <a class="forgot-link" href="#" onclick="showForgot()">비밀번호 찾기</a>
    </div>

    <button class="submit-btn" id="loginBtn" onclick="doLogin()">
      <div class="spinner"></div>
      <span class="btn-text">로그인</span>
    </button>


    <div class="form-footer">
      <p>계정이 없으신가요? <a href="signup.html">회원가입</a></p>
    </div>
  </div>
</div>

<script>
function clearErr(el) {
  el.classList.remove('err');
  const e = document.getElementById(el.id+'_err');
  if(e) e.classList.remove('on');
  document.getElementById('alertErr').classList.remove('on');
}

function showErr(id, msg) {
  const el = document.getElementById(id); el.classList.add('err');
  const e = document.getElementById(id+'_err');
  if(e){e.textContent=msg; e.classList.add('on');}
}

function togglePw() {
  const fi = document.getElementById('pw');
  fi.type = fi.type==='password' ? 'text' : 'password';
}

function doLogin() {
  const email = document.getElementById('email').value.trim().toLowerCase();
  const pw    = document.getElementById('pw').value;
  let ok = true;
  if(!email){showErr('email','이메일을 입력해주세요');ok=false;}
  if(!pw)   {showErr('pw','비밀번호를 입력해주세요');ok=false;}
  if(!ok) return;

  const btn = document.getElementById('loginBtn');
  btn.classList.add('loading');

  setTimeout(() => {
    btn.classList.remove('loading');

    // 실제 가입자 목록에서 인증
    const members = JSON.parse(localStorage.getItem('vingly_members') || '[]');
    const acc = members.find(m => m.email.toLowerCase() === email && m.pw === pw);

    if (!acc) {
      document.getElementById('alertErr').classList.add('on');
      document.getElementById('alertErrMsg').textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      return;
    }

    // sessionStorage 사용 — 탭 닫으면 자동 로그아웃, 뒤로가기 버그 없음
    sessionStorage.setItem('vingly_user', JSON.stringify({ email: acc.email, role: acc.role, name: acc.name }));
    // localStorage는 "로그인 상태 유지" 체크 시에만 저장
    if (document.getElementById('remember').checked) {
      localStorage.setItem('vingly_user', JSON.stringify({ email: acc.email, role: acc.role, name: acc.name }));
    } else {
      localStorage.removeItem('vingly_user');
    }

    if(acc.role==='brand')       location.replace('brand-dashboard.html');
    else if(acc.role==='influencer') location.replace('influencer-dashboard.html');
  }, 900);
}

function socialLogin(provider) {
  alert(provider==='kakao' ? '카카오 로그인은 사업자 등록 후 연동 예정입니다.' : '구글 로그인은 준비 중입니다.');
}

function showForgot() {
  alert('비밀번호 찾기는 실제 서비스 오픈 후 활성화됩니다.\nvingly.official@gmail.com으로 문의해주세요.');
}

// 자동 로그인 — sessionStorage 우선, 없으면 localStorage(로그인 유지) 확인
const sess = sessionStorage.getItem('vingly_user') || localStorage.getItem('vingly_user');
if(sess) {
  try {
    const u = JSON.parse(sess);
    if(u.role==='brand')       location.replace('brand-dashboard.html');
    else if(u.role==='influencer') location.replace('influencer-dashboard.html');
  } catch(e) {
    sessionStorage.removeItem('vingly_user');
    localStorage.removeItem('vingly_user');
  }
}
</script>
</body>
</html>
