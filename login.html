<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-TH29BK606P"></script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-TH29BK606P');

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vingly — 로그인</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'><rect width='28' height='28' rx='7' fill='%2300B37E'/><path d='M7 14L12 19L21 10' stroke='%230A0C10' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C0E12; --ink-60:rgba(12,14,18,.6); --ink-35:rgba(12,14,18,.35);
  --ink-14:rgba(12,14,18,.14); --ink-06:rgba(12,14,18,.06);
  --canvas:#F5F4F0; --white:#fff;
  --blue:#1D4ED8; --blue-bg:#EFF6FF;
  --green:#00B37E; --green-bg:#E6FBF4;
  --red:#DC2626; --red-bg:#FEF2F2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh;display:grid;grid-template-columns:1fr 1fr;-webkit-font-smoothing:antialiased}
.left{background:var(--ink);display:flex;flex-direction:column;justify-content:space-between;padding:48px;position:relative;overflow:hidden}
.left-orb{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none}
.orb1{width:400px;height:400px;top:-120px;left:-80px;background:radial-gradient(circle,rgba(29,78,216,.3) 0%,transparent 65%)}
.orb2{width:300px;height:300px;bottom:-80px;right:-60px;background:radial-gradient(circle,rgba(4,120,87,.2) 0%,transparent 65%)}
.left-logo{display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.logo-gem{width:34px;height:34px;border-radius:9px;background:#00B37E;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:19px;font-weight:800;color:#fff;letter-spacing:-.4px}
.left-main{position:relative;z-index:1}
.left-title{font-size:clamp(28px,3.5vw,44px);font-weight:800;color:#fff;line-height:1.1;letter-spacing:-1.5px;margin-bottom:14px}
.left-title em{font-style:normal;color:#7CB9FF}
.left-desc{font-size:15px;color:rgba(255,255,255,.5);line-height:1.75;max-width:360px;font-weight:400}
.left-stats{display:flex;flex-direction:column;gap:14px;position:relative;z-index:1}
.stat-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;display:flex;align-items:center;gap:14px}
.sc-ico{width:40px;height:40px;border-radius:10px;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sc-val{font-size:20px;font-weight:800;color:#fff;letter-spacing:-.5px}
.sc-lbl{font-size:12px;color:rgba(255,255,255,.4);margin-top:1px;font-weight:500}
.sc-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;margin-top:4px;display:inline-block}
.badge-green{background:rgba(5,150,105,.2);color:#00E5A0}
.badge-blue{background:rgba(29,78,216,.2);color:#7CB9FF}
.right{display:flex;align-items:center;justify-content:center;padding:48px 40px}
.form-box{width:100%;max-width:420px}
.form-header{margin-bottom:32px}
.form-eyebrow{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-35);margin-bottom:8px}
.form-title{font-size:28px;font-weight:800;letter-spacing:-1px;color:var(--ink);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--ink-60);font-weight:400}
.form-sub a{color:var(--blue);text-decoration:none;font-weight:600}
.fg{margin-bottom:14px}
.fl{font:700 13px/1 'Pretendard',sans-serif;color:var(--ink);display:block;margin-bottom:6px}
.fi{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--ink-14);background:var(--ink-06);font:400 14px/1 'Pretendard',sans-serif;outline:none;transition:all .18s;min-height:46px;color:var(--ink)}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(29,78,216,.1);background:var(--white)}
.fi.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.08)}
.ferr{font-size:12px;color:var(--red);margin-top:4px;display:none}
.ferr.on{display:block}
.pw-wrap{position:relative}
.pw-wrap .fi{padding-right:46px}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-35);font-size:14px;padding:4px}
.form-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.remember{display:flex;align-items:center;gap:7px;cursor:pointer}
.remember input{width:15px;height:15px;accent-color:var(--blue)}
.remember span{font-size:13px;font-weight:500;color:var(--ink-60)}
.forgot-link{font-size:13px;font-weight:600;color:var(--blue);background:none;border:none;cursor:pointer}
.submit-btn{width:100%;padding:14px;border-radius:11px;background:var(--ink);color:#fff;border:none;font:800 15px/1 'Pretendard',sans-serif;cursor:pointer;min-height:50px;transition:all .22s;display:flex;align-items:center;justify-content:center;gap:8px}
.submit-btn:hover{background:#1a1d24;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.submit-btn.loading{opacity:.7;pointer-events:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
.submit-btn.loading .spinner{display:block}
.submit-btn.loading .btn-text{display:none}
.alert{padding:12px 14px;border-radius:10px;font-size:13px;font-weight:600;margin-bottom:16px;display:none;align-items:center;gap:8px}
.alert.on{display:flex}
.alert-err{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.alert-ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(4,120,87,.2)}
.form-footer{text-align:center;margin-top:20px}
.form-footer p{font-size:13px;color:var(--ink-60)}
.form-footer a{color:var(--blue);text-decoration:none;font-weight:600}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  body{grid-template-columns:1fr}
  .left{padding:24px;min-height:auto}
  .left-main,.left-stats{display:none}
  .right{padding:32px 20px}
}
</style>
</head>
<body>

<div class="left">
  <div class="orb1 left-orb"></div>
  <div class="orb2 left-orb"></div>
  <div class="left-logo">
    <div class="logo-gem">
      <svg viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg" width="34" height="34">
        <rect width="28" height="28" rx="7" fill="#00B37E"/>
        <path d="M7 14 L12 19 L21 10" stroke="#0A0C10" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-name">Vingly</span>
  </div>
  <div class="left-main">
    <h1 class="left-title">브랜드와 크리에이터를<br><em>연결하는</em> 커머스<br>플랫폼</h1>
    <p class="left-desc">계약서, 미팅 없이 브랜드는 제품을 올리고, 크리에이터는 링크를 공유합니다. 수익 정산은 자동으로.</p>
  </div>
  <div class="left-stats">
    <div class="stat-card">
      <div class="sc-ico">🚀</div>
      <div>
        <div class="sc-val">파일럿 오픈</div>
        <div class="sc-lbl">지금 얼리버드 모집 중</div>
        <div class="sc-badge badge-green">수수료 0% 영구 혜택</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="sc-ico">🎁</div>
      <div>
        <div class="sc-val">크리에이터 무료</div>
        <div class="sc-lbl">플랫폼 수수료 없음</div>
        <div class="sc-badge badge-blue">브랜드 1.5% 얼리버드</div>
      </div>
    </div>
  </div>
</div>

<div class="right">
  <div class="form-box">
    <div class="form-header">
      <div class="form-eyebrow">Welcome back</div>
      <h2 class="form-title">로그인</h2>
      <p class="form-sub">처음이신가요? <a href="signup.html">무료로 시작하기 →</a></p>
    </div>

    <div class="alert alert-err" id="alertErr"><span>⚠️</span><span id="alertErrMsg"></span></div>
