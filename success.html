<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 — Vingly</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>window.addEventListener('load', function() { emailjs.init('ni95sDX1JNQCe4_tI'); });</script>
<style>
:root{--green:#00B37E;--blue:#1D4ED8;--ink:#0A0C10;--canvas:#F9F8F4;--red:#991B1B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px 32px;max-width:440px;width:100%;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.06)}
.spinner{width:40px;height:40px;border:3px solid rgba(29,78,216,.15);border-top-color:var(--blue);border-radius:50%;margin:0 auto 20px;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:26px}
.icon.ok{background:#E6FBF4}
.icon.err{background:#FEF2F2}
h1{font-size:19px;font-weight:800;margin-bottom:8px}
p{font-size:13.5px;color:rgba(10,12,16,.55);line-height:1.6;margin-bottom:20px}
.receipt{text-align:left;background:var(--canvas);border-radius:12px;padding:18px 20px;margin-bottom:22px}
.r-row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;font-size:14px;border-bottom:1px solid rgba(10,12,16,.08)}
.r-row:last-child{border-bottom:none}
.r-label{color:rgba(10,12,16,.5);flex-shrink:0}
.r-val{font-weight:700;text-align:right;word-break:break-all}
.r-val.amt{color:var(--green);font-size:17px}
.copy-row{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.copy-btn{flex-shrink:0;border:none;background:rgba(29,78,216,.1);color:var(--blue);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.copy-btn:active{transform:scale(.92)}
.copy-btn.copied{background:var(--green);color:#fff}
.note{font-size:12.5px;color:rgba(10,12,16,.45);margin-top:-8px;margin-bottom:20px;line-height:1.6}
.btn{display:inline-block;padding:12px 24px;border-radius:10px;background:var(--blue);color:#fff;text-decoration:none;font-weight:700;font-size:14px}
</style>
</head>
<body>
<div class="card" id="card">
  <div class="spinner"></div>
  <h1>결제를 확인하고 있어요</h1>
  <p>잠시만 기다려주세요.</p>
</div>

<script type="module">
  const params = new URLSearchParams(location.search)
  const paymentKey = params.get('paymentKey')
  const orderId = params.get('orderId')
  const amount = params.get('amount')

  const card = document.getElementById('card')

  window.copyText = async function(text, btn) {
    try {
      await navigator.clipboard.writeText(text)
    } catch (e) {
      const ta = document.createElement('textarea')
      ta.value = text
      ta.style.position = 'fixed'
      ta.style.opacity = '0'
      document.body.appendChild(ta)
      ta.select()
      document.execCommand('copy')
      document.body.removeChild(ta)
    }
    const original = btn.textContent
    btn.textContent = '✓'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied') }, 1500)
  }

  function showError(msg) {
    card.innerHTML = `
      <div class="icon err">✕</div>
      <h1>결제 승인에 실패했어요</h1>
      <p>${msg}</p>
      <a class="btn" href="index.html">홈으로 돌아가기</a>`
  }

  function showSuccess(order, alreadyPaid) {
    const rows = []
    if (order?.orderId) rows.push(['주문번호', `
      <span class="copy-row">
        <span>${order.orderId}</span>
        <button class="copy-btn" onclick="copyText('${order.orderId}', this)">복사</button>
      </span>`])
    if (order?.productName) rows.push(['상품명', order.productName])
    if (order?.amount) rows.push(['결제금액', '₩' + Number(order.amount).toLocaleString(), 'amt'])
    if (order?.buyerName) rows.push(['받는 분', order.buyerName])
    if (order?.shippingAddress) rows.push(['배송지', order.shippingAddress])

    const receiptHtml = rows.length ? `
      <div class="receipt">
        ${rows.map(([label, val, cls]) => `
          <div class="r-row">
            <div class="r-label">${label}</div>
            <div class="r-val${cls ? ' ' + cls : ''}">${val}</div>
          </div>`).join('')}
      </div>` : ''

    const lookupUrl = order?.orderId ? `order-lookup.html?orderId=${encodeURIComponent(order.orderId)}` : 'order-lookup.html'

    const emailNote = order?.buyerEmail
      ? `<div class="note">주문 확인 내용은 ${order.buyerEmail} 로도 발송됩니다. 배송 상태는 <a href="${lookupUrl}" style="color:var(--blue);font-weight:700">주문 조회 페이지</a>에서 언제든 확인할 수 있어요.</div>`
      : `<div class="note">이 화면을 캡처해두시면 문의 시 참고하기 좋아요. 나중에 <a href="${lookupUrl}" style="color:var(--blue);font-weight:700">주문 조회 페이지</a>에서 주문번호와 전화번호로 배송 상태를 확인할 수 있어요.</div>`

    card.innerHTML = `
      <div class="icon ok">✓</div>
      <h1>결제가 완료됐어요</h1>
      <p>주문이 정상적으로 접수됐습니다.</p>
      ${receiptHtml}
      ${emailNote}
      <a class="btn" href="index.html">홈으로 돌아가기</a>
      <a href="${lookupUrl}" style="display:block;margin-top:10px;font-size:13px;color:rgba(10,12,16,.5);text-decoration:underline">배송 상태 바로 조회하기</a>`

    // 새로고침 등으로 이미 승인된 주문을 다시 보여주는 경우가 아닐 때만 메일 발송 (중복 발송 방지)
    // emailjs 스크립트 로드 실패 등으로 이 블록에서 오류가 나도 위에서 이미 그려진 결제완료 화면에는 영향 없어야 함
    if (!alreadyPaid && order?.buyerEmail) {
      try {
        const msgLines = [
          `${order.buyerName || '고객'}님, Vingly에서 주문해주셔서 감사합니다.`,
          '',
          `주문번호: ${order.orderId || '-'}`,
          `상품명: ${order.productName || '-'}`,
          `결제금액: ₩${Number(order.amount || 0).toLocaleString()}`,
          `배송지: ${order.shippingAddress || '-'}`,
          '',
          '배송 관련 문의는 구매하신 채널의 크리에이터 링크 또는 vingly.official@gmail.com 으로 연락해주세요.'
        ]
        if (typeof emailjs !== 'undefined') {
          emailjs.send('service_jrejejn', 'template_pz9kl97', {
            to_email: order.buyerEmail,
            email: order.buyerEmail,
            user_name: order.buyerName || '고객',
            user_role: '구매자',
            message: msgLines.join('\n'),
            title: 'Vingly 주문 확인'
          }).catch(e => console.error('주문 확인 메일 발송 실패:', e))
        } else {
          console.error('emailjs 스크립트가 로드되지 않아 주문 확인 메일을 보내지 못했습니다.')
        }
      } catch (e) {
        console.error('주문 확인 메일 발송 중 오류:', e)
      }
    }
  }

  if (!paymentKey || !orderId || !amount) {
    showError('결제 정보를 확인할 수 없습니다.')
  } else {
    try {
      // Supabase Edge Function(confirm-payment)에서 Toss 결제승인 API를 서버사이드로 호출하고
      // orders 테이블 상태를 confirmed로 갱신한다. 시크릿 키는 Edge Function 환경변수에만 존재하며
      // 프론트엔드에는 절대 노출되지 않는다.
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cmhwZHFycnpobmhuYWVsYWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjE5NTgsImV4cCI6MjA5ODQzNzk1OH0.iEhPtyWD09rEp6OIJf7eN5gC0yqtj-0xlGHvS3bZZHI'

      const res = await fetch('https://hzrhpdqrrzhnhnaelaie.supabase.co/functions/v1/confirm-payment', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) })
      })

      const data = await res.json().catch(() => ({}))

      if (!res.ok) {
        showError(data.message || '결제 승인 중 오류가 발생했습니다.')
      } else {
        try {
          showSuccess(data.order, data.alreadyPaid)
        } catch (renderErr) {
          console.error('결제완료 화면 렌더링 중 오류(결제 자체는 성공):', renderErr)
        }
      }
    } catch (e) {
      showError('네트워크 오류가 발생했습니다. 다시 시도해주세요.')
    }
  }
</script>
</body>
</html>
