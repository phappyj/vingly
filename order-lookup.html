<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주문 조회 — Vingly</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--green:#00B37E;--blue:#1D4ED8;--ink:#0A0C10;--canvas:#F9F8F4;--red:#991B1B}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--canvas);color:var(--ink);min-height:100vh}
.nav{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;border-bottom:1px solid rgba(10,12,16,.08);background:#fff}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;text-decoration:none;color:var(--ink)}
.logo-badge{width:26px;height:26px;border-radius:7px;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px}
.wrap{max-width:480px;margin:0 auto;padding:40px 20px}
h1{font-size:20px;font-weight:800;margin-bottom:6px}
.sub{font-size:13.5px;color:rgba(10,12,16,.5);margin-bottom:28px;line-height:1.6}
.field{margin-bottom:14px}
.field label{display:block;font:700 13px/1 'Pretendard',sans-serif;margin-bottom:6px}
.field input{width:100%;padding:13px 14px;border-radius:10px;border:1.5px solid rgba(10,12,16,.14);background:rgba(10,12,16,.03);font:400 16px/1.3 'Pretendard',sans-serif;font-family:inherit;outline:none}
.field input:focus{border-color:var(--blue);background:#fff}
.err{font:600 13px/1.5 'Pretendard',sans-serif;color:var(--red);display:none;margin-bottom:14px}
.btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--blue);color:#fff;font:700 15px/1 'Pretendard',sans-serif;cursor:pointer;margin-top:6px}
.btn:disabled{opacity:.5;cursor:not-allowed}

.result{margin-top:26px;background:#fff;border-radius:14px;padding:22px;box-shadow:0 4px 20px rgba(0,0,0,.05);display:none}
.r-status{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.r-status-dot{width:10px;height:10px;border-radius:50%;background:var(--green)}
.r-status-dot.cancelled{background:var(--red)}
.r-status-text{font-weight:800;font-size:16px}

.steps{display:flex;align-items:flex-start;margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid rgba(10,12,16,.08)}
.step{flex:1;text-align:center;position:relative}
.step-dot{width:22px;height:22px;border-radius:50%;background:rgba(10,12,16,.1);color:rgba(10,12,16,.35);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;margin:0 auto 6px;position:relative;z-index:2}
.step.done .step-dot{background:var(--green);color:#fff}
.step-line{position:absolute;top:11px;left:-50%;width:100%;height:2px;background:rgba(10,12,16,.1);z-index:1}
.step:first-child .step-line{display:none}
.step.done .step-line{background:var(--green)}
.step-label{font-size:11.5px;color:rgba(10,12,16,.45);font-weight:600}
.step.done .step-label{color:var(--ink)}

.r-row{display:flex;justify-content:space-between;gap:12px;padding:9px 0;font-size:14px;border-bottom:1px solid rgba(10,12,16,.06)}
.r-row:last-child{border-bottom:none}
.r-label{color:rgba(10,12,16,.5);flex-shrink:0}
.r-val{font-weight:700;text-align:right;word-break:break-all}
.r-val.amt{color:var(--green);font-size:16px}
.copy-row{display:flex;align-items:center;gap:8px;justify-content:flex-end}
.copy-btn{flex-shrink:0;border:none;background:rgba(29,78,216,.1);color:var(--blue);width:26px;height:26px;border-radius:7px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.copy-btn:active{transform:scale(.92)}
.copy-btn.copied{background:var(--green);color:#fff}
.track-box{margin-top:14px;padding:14px;background:var(--canvas);border-radius:10px;font-size:13.5px}
.track-box .tt{font-weight:700;margin-bottom:4px}
.track-box .empty{color:rgba(10,12,16,.4)}

.report-toggle{display:block;margin-top:18px;padding-top:16px;border-top:1px solid rgba(10,12,16,.08);text-align:center;font-size:13px;color:rgba(10,12,16,.45);text-decoration:underline;cursor:pointer;background:none;border:none;width:100%}
.report-form{display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(10,12,16,.08)}
.report-form.open{display:block}
.report-form select,.report-form textarea{width:100%;padding:11px 12px;border-radius:9px;border:1.5px solid rgba(10,12,16,.14);background:rgba(10,12,16,.03);font:400 14px/1.4 'Pretendard',sans-serif;font-family:inherit;outline:none;margin-bottom:10px}
.report-form textarea{min-height:80px;resize:vertical}
.report-form select:focus,.report-form textarea:focus{border-color:var(--blue);background:#fff}
.report-submit{width:100%;padding:12px;border-radius:10px;border:none;background:var(--red);color:#fff;font:700 14px/1 'Pretendard',sans-serif;cursor:pointer}
.report-submit:disabled{opacity:.5;cursor:not-allowed}
.report-done{text-align:center;padding:10px 0;font:600 13.5px/1.5 'Pretendard',sans-serif;color:var(--green)}
</style>
</head>
<body>

<div class="nav">
  <a class="logo" href="index.html"><div class="logo-badge">✓</div>Vingly</a>
</div>

<div class="wrap">
  <h1>주문 조회</h1>
  <p class="sub">주문 시 입력한 전화번호와 주문번호로 배송 상태를 확인할 수 있어요. 주문번호는 결제 완료 화면이나 확인 메일에서 찾을 수 있습니다.</p>

  <div class="field">
    <label>주문번호</label>
    <input type="text" id="order_id" placeholder="예: vingly_1783317591529_ow924q">
  </div>
  <div class="field">
    <label>주문 시 입력한 전화번호</label>
    <input type="tel" id="phone" placeholder="010-0000-0000">
  </div>

  <div class="err" id="err"></div>
  <button class="btn" id="searchBtn" onclick="lookupOrder()">조회하기</button>

  <div class="result" id="result"></div>
</div>

<script>
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cmhwZHFycnpobmhuYWVsYWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjE5NTgsImV4cCI6MjA5ODQzNzk1OH0.iEhPtyWD09rEp6OIJf7eN5gC0yqtj-0xlGHvS3bZZHI'

  // URL에 주문번호가 같이 오면 (성공 화면에서 링크 클릭 등) 미리 채워줌
  const params = new URLSearchParams(location.search)
  if (params.get('orderId')) document.getElementById('order_id').value = params.get('orderId')

  window.copyText = async function(text, btn) {
    try {
      await navigator.clipboard.writeText(text)
    } catch (e) {
      // 클립보드 API 실패 시 폴백
      const ta = document.createElement('textarea')
      ta.value = text
      ta.style.position = 'fixed'
      ta.style.opacity = '0'
      document.body.appendChild(ta)
      ta.select()
      document.execCommand('copy')
      document.body.removeChild(ta)
    }
    const original = btn.textContent
    btn.textContent = '✓'
    btn.classList.add('copied')
    setTimeout(() => { btn.textContent = original; btn.classList.remove('copied') }, 1500)
  }

  window.lookupOrder = async function() {
    const orderId = document.getElementById('order_id').value.trim()
    const phone = document.getElementById('phone').value.trim()
    const errEl = document.getElementById('err')
    const resultEl = document.getElementById('result')
    const btn = document.getElementById('searchBtn')

    errEl.style.display = 'none'
    resultEl.style.display = 'none'

    if (!orderId || !phone) {
      errEl.textContent = '주문번호와 전화번호를 모두 입력해주세요.'
      errEl.style.display = 'block'
      return
    }

    btn.disabled = true
    btn.textContent = '조회 중...'

    try {
      const res = await fetch('https://hzrhpdqrrzhnhnaelaie.supabase.co/functions/v1/order-lookup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ orderId, phone })
      })
      const data = await res.json().catch(() => ({}))

      if (!res.ok) {
        errEl.textContent = data.message || '조회 중 오류가 발생했습니다.'
        errEl.style.display = 'block'
      } else {
        renderResult(data.order)
      }
    } catch (e) {
      errEl.textContent = '네트워크 오류가 발생했습니다. 다시 시도해주세요.'
      errEl.style.display = 'block'
    } finally {
      btn.disabled = false
      btn.textContent = '조회하기'
    }
  }

  const REPORT_FORM_HTML = `
    <button class="report-toggle" onclick="toggleReportForm()">🚨 이 주문에 문제가 있으신가요? 신고하기</button>
    <div class="report-form" id="reportForm">
      <select id="report_reason">
        <option value="">신고 사유를 선택해주세요</option>
        <option value="상품 미배송">상품이 오지 않았어요</option>
        <option value="상품 불량">받은 상품에 문제가 있어요</option>
        <option value="설명과 다름">설명/사진과 실제 상품이 달라요</option>
        <option value="환불 요청">환불하고 싶어요</option>
        <option value="기타">기타 문의</option>
      </select>
      <textarea id="report_desc" placeholder="자세한 상황을 알려주시면 빠르게 확인하는 데 도움이 돼요 (선택)"></textarea>
      <button class="report-submit" id="reportSubmitBtn" onclick="submitReport()">신고 접수하기</button>
      <div id="reportErr" class="err" style="display:none;margin-top:10px;margin-bottom:0"></div>
      <div id="reportDone" class="report-done" style="display:none">✅ 신고가 접수됐어요. 확인 후 조치할게요.</div>
    </div>`

  window.toggleReportForm = function() {
    document.getElementById('reportForm').classList.toggle('open')
  }

  window.submitReport = async function() {
    const reason = document.getElementById('report_reason').value
    const description = document.getElementById('report_desc').value.trim()
    const errEl = document.getElementById('reportErr')
    const btn = document.getElementById('reportSubmitBtn')
    errEl.style.display = 'none'

    if (!reason) {
      errEl.textContent = '신고 사유를 선택해주세요.'
      errEl.style.display = 'block'
      return
    }

    const orderId = document.getElementById('order_id').value.trim()
    const phone = document.getElementById('phone').value.trim()

    btn.disabled = true
    btn.textContent = '접수 중...'

    try {
      const res = await fetch('https://hzrhpdqrrzhnhnaelaie.supabase.co/functions/v1/submit-report', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify({ orderId, phone, reason, description })
      })
      const data = await res.json().catch(() => ({}))

      if (!res.ok) {
        errEl.textContent = data.message || '신고 접수 중 오류가 발생했습니다.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.textContent = '신고 접수하기'
      } else {
        document.getElementById('reportForm').innerHTML = `<div class="report-done" style="display:block">✅ 신고가 접수됐어요. 확인 후 조치할게요.</div>`
      }
    } catch (e) {
      errEl.textContent = '네트워크 오류가 발생했습니다. 다시 시도해주세요.'
      errEl.style.display = 'block'
      btn.disabled = false
      btn.textContent = '신고 접수하기'
    }
  }

  function renderResult(order) {
    const resultEl = document.getElementById('result')

    if (order.cancelled) {
      resultEl.innerHTML = `
        <div class="r-status">
          <div class="r-status-dot cancelled"></div>
          <div class="r-status-text">${order.orderStatusLabel}</div>
        </div>
        ${buildRows(order)}
        ${REPORT_FORM_HTML}`
      resultEl.style.display = 'block'
      return
    }

    const STEP_ORDER = ['preparing', 'shipping', 'delivered']
    const STEP_LABEL = { preparing: '결제완료', shipping: '배송중', delivered: '배송완료' }
    const currentIdx = STEP_ORDER.indexOf(order.shippingStatus)

    const stepsHtml = STEP_ORDER.map((s, i) => `
      <div class="step ${i <= currentIdx ? 'done' : ''}">
        <div class="step-line"></div>
        <div class="step-dot">${i <= currentIdx ? '✓' : i + 1}</div>
        <div class="step-label">${STEP_LABEL[s]}</div>
      </div>`).join('')

    const trackHtml = `
      <div class="track-box">
        <div class="tt">📦 배송 정보</div>
        ${order.trackingNumber
          ? `<div class="copy-row" style="justify-content:space-between">
               <span>${order.courier || '택배사'} · ${order.trackingNumber}</span>
               <button class="copy-btn" onclick="copyText('${order.trackingNumber}', this)">복사</button>
             </div>`
          : `<div class="empty">아직 운송장번호가 등록되지 않았습니다.</div>`}
      </div>`

    resultEl.innerHTML = `
      <div class="r-status">
        <div class="r-status-dot"></div>
        <div class="r-status-text">${order.shippingStatusLabel}</div>
      </div>
      <div class="steps">${stepsHtml}</div>
      ${buildRows(order)}
      ${trackHtml}
      ${REPORT_FORM_HTML}
    `
    resultEl.style.display = 'block'
  }

  function buildRows(order) {
    const rows = []
    if (order.orderId) {
      rows.push(['주문번호', `
        <span class="copy-row">
          <span>${order.orderId}</span>
          <button class="copy-btn" onclick="copyText('${order.orderId}', this)">복사</button>
        </span>`])
    }
    if (order.productName) rows.push(['상품명', order.productName])
    if (order.amount) rows.push(['결제금액', '₩' + Number(order.amount).toLocaleString(), 'amt'])
    if (order.shippingAddress) rows.push(['배송지', order.shippingAddress])
    if (order.createdAt) rows.push(['주문일시', new Date(order.createdAt).toLocaleString('ko-KR')])
    return rows.map(([label, val, cls]) => `
      <div class="r-row">
        <div class="r-label">${label}</div>
        <div class="r-val${cls ? ' ' + cls : ''}">${val}</div>
      </div>`).join('')
  }
</script>
</body>
</html>
