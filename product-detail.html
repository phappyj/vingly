<!DOCTYPE html>
<html lang="ko">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제품 상세 — Vingly</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 28 28'><rect width='28' height='28' rx='7' fill='%2300B37E'/><path d='M7 14L12 19L21 10' stroke='%230A0C10' stroke-width='2.8' stroke-linecap='round' stroke-linejoin='round' fill='none'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0A0C10;--ink-70:rgba(10,12,16,.7);--ink-40:rgba(10,12,16,.4);
  --ink-14:rgba(10,12,16,.14);--ink-07:rgba(10,12,16,.07);
  --canvas:#F4F3EF;--white:#fff;
  --green:#00B37E;--green-bg:#E6FBF4;
  --blue:#1D4ED8;--blue-bg:#EEF3FD;
  --amber:#92400E;--amber-bg:#FFFBEB;
  --red:#DC2626;--red-bg:#FEF2F2;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;background:var(--canvas);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh}

/* 네비 */
.nav{background:var(--white);border-bottom:1px solid var(--ink-14);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.nav-gem{width:28px;height:28px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center}
.nav-name{font:800 17px/1 'Pretendard',sans-serif;color:var(--ink);letter-spacing:-.3px}
.nav-r{display:flex;align-items:center;gap:8px}
.nav-btn{padding:7px 16px;border-radius:8px;font:700 13px/1 'Pretendard',sans-serif;cursor:pointer;border:none;transition:all .2s}
.nav-login{background:var(--ink-07);color:var(--ink-70)}
.nav-signup{background:var(--green);color:#fff}

/* 로딩 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--ink-07);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 메인 레이아웃 */
.container{max-width:960px;margin:0 auto;padding:28px 20px 60px}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}

/* 이미지 */
.img-area{}
.img-main{width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;background:linear-gradient(135deg,var(--green-bg),#d0f5e8);position:relative;margin-bottom:10px}
.img-main img{width:100%;height:100%;object-fit:contain;background:#f8f8f8}
.img-main .img-prev,.img-main .img-next{position:absolute;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.35);color:#fff;border:none;cursor:pointer;font-size:18px;line-height:1;transition:all .2s;display:flex;align-items:center;justify-content:center}
.img-main .img-prev{left:10px}
.img-main .img-next{right:10px}
.img-main .img-prev:hover,.img-main .img-next:hover{background:rgba(0,0,0,.6)}
.img-dots{display:flex;justify-content:center;gap:6px;margin-bottom:12px}
.img-dot{width:8px;height:8px;border-radius:50%;background:var(--ink-14);cursor:pointer;transition:all .2s}
.img-dot.on{background:var(--green);width:20px;border-radius:4px}
.img-thumbs{display:flex;gap:8px}
.img-thumb{width:64px;height:64px;border-radius:10px;overflow:hidden;border:2px solid var(--ink-14);cursor:pointer;flex-shrink:0;transition:all .2s;background:#f8f8f8}
.img-thumb img{width:100%;height:100%;object-fit:contain}
.img-thumb.on{border-color:var(--green)}

/* 제품 정보 */
.info-area{}
.info-brand{font:400 12px/1 'Pretendard',sans-serif;color:var(--ink-40);margin-bottom:6px}
.info-name{font:800 26px/1.2 'Pretendard',sans-serif;color:var(--ink);letter-spacing:-.8px;margin-bottom:14px}
.info-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.badge{display:inline-flex;align-items:center;font:700 12px/1 'Pretendard',sans-serif;padding:6px 12px;border-radius:7px}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.info-price{font:800 32px/1 'Pretendard',sans-serif;color:var(--ink);letter-spacing:-1px;margin-bottom:6px}
.info-price-sub{font:400 13px/1 'Pretendard',sans-serif;color:var(--ink-40);margin-bottom:20px}
.info-desc{font:400 14px/1.75 'Pretendard',sans-serif;color:var(--ink-70);margin-bottom:20px;padding:14px;background:var(--ink-07);border-radius:10px}

/* 핵심 포인트 */
.kp-box{background:var(--green-bg);border-radius:10px;padding:14px 16px;margin-bottom:16px}
.kp-title{font:700 12px/1 'Pretendard',sans-serif;color:var(--green);margin-bottom:10px;letter-spacing:.04em}
.kp-item{display:flex;gap:8px;margin-bottom:7px}
.kp-item:last-child{margin-bottom:0}
.kp-check{color:var(--green);font-weight:700;flex-shrink:0}
.kp-text{font:400 13px/1.5 'Pretendard',sans-serif;color:var(--ink-70)}

/* 구매 영역 */
.buy-box{background:var(--white);border:1.5px solid var(--ink-14);border-radius:14px;padding:18px;margin-bottom:14px}
.buy-qty{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.buy-qty-label{font:600 13px/1 'Pretendard',sans-serif;color:var(--ink-70)}
.qty-ctrl{display:flex;align-items:center;gap:0;border:1.5px solid var(--ink-14);border-radius:9px;overflow:hidden}
.qty-btn{width:36px;height:36px;border:none;background:var(--ink-07);font:700 18px/1 'Pretendard',sans-serif;cursor:pointer;color:var(--ink);transition:all .15s}
.qty-btn:hover{background:var(--ink-14)}
.qty-num{width:44px;text-align:center;font:700 14px/1 'Pretendard',sans-serif;color:var(--ink);border:none;background:var(--white);pointer-events:none}
.buy-total{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid var(--ink-07)}
.buy-total-label{font:500 13px/1 'Pretendard',sans-serif;color:var(--ink-40)}
.buy-total-price{font:800 22px/1 'Pretendard',sans-serif;color:var(--ink);letter-spacing:-.5px}

.buy-btn{width:100%;padding:16px;border-radius:12px;background:var(--green);color:#fff;border:none;font:800 16px/1 'Pretendard',sans-serif;cursor:pointer;transition:all .22s;margin-bottom:10px;min-height:54px}
.buy-btn:hover{background:#009e6e;transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,179,126,.3)}
.buy-btn:active{transform:scale(.97)}
.buy-btn.disabled{background:var(--ink-14);color:var(--ink-40);cursor:not-allowed;transform:none;box-shadow:none}
.buy-btn-sub{width:100%;padding:12px;border-radius:10px;background:var(--ink-07);color:var(--ink-70);border:1.5px solid var(--ink-14);font:700 14px/1 'Pretendard',sans-serif;cursor:pointer;transition:all .2s}
.buy-btn-sub:hover{border-color:var(--ink-40)}

/* 크리에이터 배지 */
.creator-badge{background:linear-gradient(135deg,var(--ink) 0%,#1a1d24 100%);border-radius:12px;padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.cb-ico{width:36px;height:36px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font:700 14px/1 'Pretendard',sans-serif;color:var(--ink);flex-shrink:0}
.cb-info{flex:1}
.cb-label{font:400 11px/1 'Pretendard',sans-serif;color:rgba(255,255,255,.4);margin-bottom:3px}
.cb-name{font:700 13px/1 'Pretendard',sans-serif;color:#fff}
.cb-comm{font:700 12px/1 'Pretendard',sans-serif;color:#00E5A0;background:rgba(0,229,160,.1);padding:4px 10px;border-radius:100px;flex-shrink:0}

/* 안전 결제 */
.safe-badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.safe-badge{display:flex;align-items:center;gap:5px;font:500 11px/1 'Pretendard',sans-serif;color:var(--ink-40);background:var(--ink-07);padding:5px 10px;border-radius:6px}

/* 상세 섹션 */
.detail-section{margin-top:32px}
.ds-title{font:700 16px/1 'Pretendard',sans-serif;color:var(--ink);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid var(--ink-14)}

/* 404 */
.not-found{text-align:center;padding:80px 20px}
.nf-ico{font-size:52px;margin-bottom:16px}
.nf-title{font:800 22px/1 'Pretendard',sans-serif;margin-bottom:8px}
.nf-sub{font:400 14px/1.6 'Pretendard',sans-serif;color:var(--ink-40);margin-bottom:24px}

/* 푸터 */
.footer{background:var(--white);border-top:1px solid var(--ink-14);padding:20px;text-align:center;font:400 12px/1.6 'Pretendard',sans-serif;color:var(--ink-40);margin-top:40px}
.footer a{color:var(--ink-40);text-decoration:none}

@media(max-width:768px){
  .container{padding:16px 16px 80px}
  .product-grid{grid-template-columns:1fr;gap:20px}
  .info-price{font-size:26px}
  .info-name{font-size:22px}
  /* 모바일 하단 고정 구매 버튼 */
  .mobile-buy{display:block;position:fixed;bottom:0;left:0;right:0;padding:12px 16px 20px;background:var(--white);border-top:1px solid var(--ink-14);z-index:40}
  .buy-box{display:none}
}
@media(min-width:769px){.mobile-buy{display:none}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="index.html">
    <div class="nav-gem">
      <svg viewBox="0 0 28 28" fill="none" width="28" height="28">
        <rect width="28" height="28" rx="7" fill="#00B37E"/>
        <path d="M7 14 L12 19 L21 10" stroke="#0A0C10" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="nav-name">Vingly</span>
  </a>
  <div class="nav-r">
    <button class="nav-btn nav-login" onclick="location.href='login.html'">로그인</button>
    <button class="nav-btn nav-signup" onclick="location.href='signup.html'">무료 가입</button>
  </div>
</nav>

<div id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="font:500 14px/1 'Pretendard',sans-serif;color:var(--ink-40)">제품 정보를 불러오는 중...</div>
  </div>
</div>

<!-- 모바일 하단 고정 구매 버튼 -->
<div class="mobile-buy" id="mobile-buy" style="display:none">
  <button class="buy-btn disabled" id="mobile-buy-btn">구매하기 (준비 중)</button>
</div>

<footer class="footer">
  <div style="margin-bottom:6px">
    <a href="terms.html">이용약관</a> · <a href="privacy.html">개인정보처리방침</a> · <a href="support.html">고객지원</a>
  </div>
  <div>Vingly · 통신판매중개업자 · 사업자등록 진행 중</div>
  <div style="margin-top:4px">© 2026 Vingly. All rights reserved.</div>
</footer>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
  const supabase = createClient(
    'https://hzrhpdqrrzhnhnaelaie.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cmhwZHFycnpobmhuYWVsYWllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NjE5NTgsImV4cCI6MjA5ODQzNzk1OH0.iEhPtyWD09rEp6OIJf7eN5gC0yqtj-0xlGHvS3bZZHI'
  )

  // URL 파라미터에서 제품 ID와 크리에이터 ref 추출
  const params = new URLSearchParams(location.search)
  const productId = params.get('id')
  const creatorRef = params.get('ref') || getCookie('vingly_ref')

  // ref 쿠키 저장 (30일)
  if (params.get('ref')) setCookie('vingly_ref', params.get('ref'), 30)

  let qty = 1
  let product = null
  let currentImgIdx = 0

  if (!productId) {
    showNotFound()
  } else {
    loadProduct(productId)
  }

  async function loadProduct(id) {
    const { data, error } = await supabase
      .from('products')
      .select('*, users!brand_user(company_name)')
      .eq('id', id)
      .eq('status', 'active')
      .single()

    document.getElementById('loading').style.display = 'none'

    if (error || !data) { showNotFound(); return }

    product = data
    const images = data.images && data.images.length > 0 ? data.images : (data.image_url ? [data.image_url] : [])
    const brand = data.users?.company_name || '브랜드'
    const kps = data.key_points || []
    const earn = Math.round(data.price * data.commission_rate / 100)

    // 크리에이터 정보 (ref로 조회)
    let creatorName = null
    if (creatorRef) {
      const { data: linkData } = await supabase
        .from('links')
        .select('*, users!creator(name)')
        .eq('id', creatorRef)
        .single()
      if (linkData) creatorName = linkData.users?.name || '크리에이터'
    }

    // 페이지 타이틀
    document.title = `${data.name} — Vingly`

    const app = document.getElementById('app')
    app.innerHTML = `
      <div class="container">
        <div class="product-grid">
          <!-- 이미지 영역 -->
          <div class="img-area">
            <div class="img-main" id="img-main-wrap">
              ${images.length > 0
                ? `<img id="img-main" src="${images[0]}" alt="${data.name}">`
                : `<div style="display:flex;align-items:center;justify-content:center;height:100%;font-size:72px">📦</div>`}
              ${images.length > 1 ? `
                <button class="img-prev" onclick="changeImg(-1)">‹</button>
                <button class="img-next" onclick="changeImg(1)">›</button>` : ''}
            </div>
            ${images.length > 1 ? `
              <div class="img-dots" id="img-dots">
                ${images.map((_, i) => `<div class="img-dot ${i===0?'on':''}" onclick="setImg(${i})"></div>`).join('')}
              </div>
              <div class="img-thumbs">
                ${images.map((src, i) => `<div class="img-thumb ${i===0?'on':''}" onclick="setImg(${i})"><img src="${src}" alt="이미지 ${i+1}"></div>`).join('')}
              </div>` : ''}
          </div>

          <!-- 정보 영역 -->
          <div class="info-area">
            <div class="info-brand">${brand}</div>
            <div class="info-name">${data.name}</div>
            <div class="info-badges">
              <span class="badge badge-green">수수료 ${data.commission_rate}%</span>
              <span class="badge badge-blue">${data.category || '기타'}</span>
            </div>
            <div class="info-price">₩${Number(data.price).toLocaleString()}</div>
            <div class="info-price-sub">부가세 포함 · 배송비 별도</div>

            ${data.description ? `<div class="info-desc">${data.description}</div>` : ''}

            ${kps.length > 0 ? `
              <div class="kp-box">
                <div class="kp-title">✨ 핵심 포인트</div>
                ${kps.map(kp => `<div class="kp-item"><span class="kp-check">✓</span><span class="kp-text">${kp}</span></div>`).join('')}
              </div>` : ''}

            ${data.target_audience ? `
              <div style="display:flex;gap:10px;background:var(--blue-bg);border-radius:9px;padding:11px 14px;margin-bottom:14px;align-items:flex-start">
                <span style="font-size:15px;flex-shrink:0">🎯</span>
                <div><div style="font:700 11px/1 'Pretendard',sans-serif;color:var(--blue);margin-bottom:4px">추천 대상</div><div style="font:400 13px/1.5 'Pretendard',sans-serif;color:var(--ink-70)">${data.target_audience}</div></div>
              </div>` : ''}

            ${creatorName ? `
              <div class="creator-badge">
                <div class="cb-ico">${creatorName[0]}</div>
                <div class="cb-info">
                  <div class="cb-label">이 링크를 공유한 크리에이터</div>
                  <div class="cb-name">${creatorName}</div>
                </div>
                <div class="cb-comm">수수료 ${data.commission_rate}%</div>
              </div>` : ''}

            <!-- 구매 박스 (PC) -->
            <div class="buy-box">
              <div class="buy-qty">
                <span class="buy-qty-label">수량</span>
                <div class="qty-ctrl">
                  <button class="qty-btn" onclick="changeQty(-1)">−</button>
                  <span class="qty-num" id="qty-num">1</span>
                  <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
              </div>
              <div class="buy-total">
                <span class="buy-total-label">총 결제금액</span>
                <span class="buy-total-price" id="total-price">₩${Number(data.price).toLocaleString()}</span>
              </div>
            </div>

            <button class="buy-btn disabled" id="buy-btn" onclick="doBuy()">
              🛒 구매하기 (결제 연동 준비 중)
            </button>
            <button class="buy-btn-sub" onclick="shareLink()">🔗 이 제품 공유하기</button>

            <div class="safe-badges">
              <span class="safe-badge">🔒 안전 결제</span>
              <span class="safe-badge">📦 판매자 직접 배송</span>
              <span class="safe-badge">↩️ 7일 이내 반품</span>
              <span class="safe-badge">🏦 구매 안전 보장</span>
            </div>
          </div>
        </div>

        ${data.creator_message ? `
          <div class="detail-section">
            <div class="ds-title">브랜드 안내사항</div>
            <div style="background:var(--amber-bg);border-radius:10px;padding:16px;border-left:3px solid #D97706;font:400 14px/1.75 'Pretendard',sans-serif;color:var(--ink-70)">${data.creator_message}</div>
          </div>` : ''}

        <div class="detail-section">
          <div class="ds-title">크리에이터와 함께하는 Vingly</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
            <div style="background:var(--white);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--ink-14)">
              <div style="font-size:24px;margin-bottom:8px">💸</div>
              <div style="font:700 13px/1 'Pretendard',sans-serif;margin-bottom:4px">크리에이터 수수료 0%</div>
              <div style="font:400 12px/1.5 'Pretendard',sans-serif;color:var(--ink-40)">판매 수익 전액 수령</div>
            </div>
            <div style="background:var(--white);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--ink-14)">
              <div style="font-size:24px;margin-bottom:8px">🔗</div>
              <div style="font:700 13px/1 'Pretendard',sans-serif;margin-bottom:4px">링크 하나로 시작</div>
              <div style="font:400 12px/1.5 'Pretendard',sans-serif;color:var(--ink-40)">팔로워 100명부터 가능</div>
            </div>
            <div style="background:var(--white);border-radius:12px;padding:16px;text-align:center;border:1px solid var(--ink-14)">
              <div style="font-size:24px;margin-bottom:8px">📅</div>
              <div style="font:700 13px/1 'Pretendard',sans-serif;margin-bottom:4px">월말 자동 정산</div>
              <div style="font:400 12px/1.5 'Pretendard',sans-serif;color:var(--ink-40)">신청 없이 자동 입금</div>
            </div>
          </div>
          <div style="text-align:center;margin-top:16px">
            <button onclick="location.href='signup.html?role=creator'" style="padding:12px 28px;border-radius:10px;background:var(--green);color:#fff;border:none;font:700 14px/1 'Pretendard',sans-serif;cursor:pointer">크리에이터로 시작하기 →</button>
          </div>
        </div>
      </div>`

    // 모바일 하단 버튼 표시
    document.getElementById('mobile-buy').style.display = 'block'

    // 이미지 배열 저장
    window._productImages = images
  }

  window.changeImg = function(dir) {
    const imgs = window._productImages || []
    if (imgs.length <= 1) return
    currentImgIdx = (currentImgIdx + dir + imgs.length) % imgs.length
    setImg(currentImgIdx)
  }

  window.setImg = function(idx) {
    currentImgIdx = idx
    const imgs = window._productImages || []
    const mainImg = document.getElementById('img-main')
    if (mainImg) mainImg.src = imgs[idx]
    document.querySelectorAll('.img-dot').forEach((d, i) => d.classList.toggle('on', i === idx))
    document.querySelectorAll('.img-thumb').forEach((t, i) => t.classList.toggle('on', i === idx))
  }

  window.changeQty = function(dir) {
    qty = Math.max(1, Math.min(99, qty + dir))
    document.getElementById('qty-num').textContent = qty
    if (product) {
      document.getElementById('total-price').textContent = '₩' + (product.price * qty).toLocaleString()
    }
  }

  window.doBuy = function() {
    alert('결제 시스템 연동 준비 중입니다.\n사업자 등록 완료 후 토스페이먼츠 결제가 활성화됩니다.')
  }

  window.shareLink = function() {
    const url = location.href
    if (navigator.share) {
      navigator.share({ title: product?.name, url })
    } else {
      navigator.clipboard.writeText(url).then(() => alert('링크가 복사됐습니다!'))
    }
  }

  function showNotFound() {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('app').innerHTML = `
      <div class="not-found">
        <div class="nf-ico">😕</div>
        <div class="nf-title">제품을 찾을 수 없습니다</div>
        <div class="nf-sub">링크가 만료됐거나 제품이 삭제됐을 수 있습니다.</div>
        <button onclick="location.href='index.html'" style="padding:12px 28px;border-radius:10px;background:var(--green);color:#fff;border:none;font:700 14px/1 'Pretendard',sans-serif;cursor:pointer">메인으로 이동</button>
      </div>`
  }

  function getCookie(name) {
    const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'))
    return match ? decodeURIComponent(match[2]) : null
  }

  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString()
    document.cookie = `${name}=${encodeURIComponent(value)};expires=${expires};path=/`
  }
</script>
</body>
</html>
